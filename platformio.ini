; Azimuth — Seeed XIAO ESP32-C3 + BNO08x (SPI). Pin map: src/main.cpp
;
; Environments (pio run -e <name>):
;   azimuth_main   — Release: OpenTrack (Hatire USB + optional Wi‑Fi UDP), HTTP portal, NVS.
;   azimuth_debug  — USB serial yaw/pitch/roll only; no Wi‑Fi / portal (smaller, faster iterate).
;
; Optional compile-time Wi‑Fi / OpenTrack: copy include/secrets.h.example → include/secrets.h (gitignored). Most users leave it empty and use the portal (NVS).

[platformio]
default_envs = azimuth_main

[env]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
lib_deps =
  sparkfun/SparkFun BNO08x Cortex Based IMU

[env:azimuth_debug]
; Omit portal HTML and network stack from the firmware image.
build_src_filter = +<*> -<portal_html.cpp>
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DIMU_DEBUG_MODE=1

[env:azimuth_main]
lib_deps =
  ${env.lib_deps}
  bblanchon/ArduinoJson @ ^7.2.0
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DIMU_DEBUG_MODE=0
  -DOPENTRACK_UDP_PORT=4242
  -DAZIMUTH_FW_VERSION=\"0.1.0-dev\"
