; Seeed XIAO ESP32-C3 + BNO08x over hardware SPI (SparkFun library default SPI pins).
; See src/main.cpp for pin map.
;
; Use env:xiao_esp32c3 for text debug output, env:xiao_esp32c3_hatire for OpenTrack (binary Hatire frames).
;
; Plain "Upload" uses only this env unless you pass -e xiao_esp32c3_hatire.

[platformio]
default_envs = xiao_esp32c3

[env]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
lib_deps =
  sparkfun/SparkFun BNO08x Cortex Based IMU

[env:xiao_esp32c3]
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DIMU_DEBUG_MODE=1

[env:xiao_esp32c3_hatire]
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DIMU_DEBUG_MODE=0
